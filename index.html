<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <!-- Sécurité : interdit tout code distant (script) et limite les connexions au strict nécessaire.
       Même si un contenu malveillant était injecté, le navigateur refuserait de l'exécuter. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://geocoding-api.open-meteo.com https://api.open-meteo.com https://archive-api.open-meteo.com; base-uri 'none'; frame-ancestors 'none'; object-src 'none'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Valise" />
  <title>Valise — Listes de voyage</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon-64.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="app" class="app">
    <header class="topbar" id="topbar"><!-- rendu par JS --></header>
    <main id="view" class="view"><!-- rendu par JS --></main>
  </div>

  <!-- FEUILLE MODALE (ajout d'item, etc.) -->
  <div id="sheet-backdrop" class="sheet-backdrop hidden"></div>
  <div id="sheet" class="sheet hidden" role="dialog" aria-modal="true"></div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
